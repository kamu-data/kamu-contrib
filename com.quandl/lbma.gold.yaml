kind: DatasetSnapshot
version: 1
content:
  name: com.quandl.lbma.gold
  kind: Root
  metadata:
    - kind: SetPollingSource
      fetch:
        kind: Url
        url: https://www.quandl.com/api/v3/datasets/LBMA/GOLD.csv?api_key=J86PRArsxou4JyiZ2-5X
      read:
        kind: Csv
        header: true
        schema:
          fields:
            - name: Date
              type: Date
            - name: USD (AM)
              type:
                kind: Decimal
                precision: 18
                scale: 4
            - name: USD (PM)
              type:
                kind: Decimal
                precision: 18
                scale: 4
            - name: GBP (AM)
              type:
                kind: Decimal
                precision: 18
                scale: 4
            - name: GBP (PM)
              type:
                kind: Decimal
                precision: 18
                scale: 4
            - name: EURO (AM)
              type:
                kind: Decimal
                precision: 18
                scale: 4
            - name: EURO (PM)
              type:
                kind: Decimal
                precision: 18
                scale: 4
      preprocess:
        kind: Sql
        engine: datafusion
        query: |
          SELECT
            "Date" as date,
            "USD (AM)" as usd_am,
            "USD (PM)" as usd_pm,
            "GBP (AM)" as gbp_am,
            "GBP (PM)" as gbp_pm,
            "EURO (AM)" as euro_am,
            "EURO (PM)" as euro_pm
          FROM input
      merge:
        kind: Ledger
        primaryKey:
        - date
    - kind: SetVocab
      eventTimeColumn: date
