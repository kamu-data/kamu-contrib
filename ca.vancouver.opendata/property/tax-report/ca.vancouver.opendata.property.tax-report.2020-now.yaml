kind: DatasetSnapshot
version: 1
content:
  name: ca.vancouver.opendata.property.tax-report.2020-now
  kind: Root
  metadata:
    - kind: SetPollingSource
      fetch:
        kind: Url
        url: https://opendata.vancouver.ca/explore/dataset/property-tax-report/download/?format=csv&timezone=America/Los_Angeles&lang=en&use_labels_for_header=true&csv_separator=%3B
      read:
        kind: Csv
        separator: ";"
        header: true
        nullValue: ""
        schema:
          fields:
            - { name: PID, type: String }
            - { name: LEGAL_TYPE, type: String }
            - { name: FOLIO, type: String }
            - { name: LAND_COORDINATE, type: String }
            - { name: ZONING_DISTRICT, type: String }
            - { name: ZONING_CLASSIFICATION, type: String }
            - { name: LOT, type: String }
            - { name: PLAN, type: String }
            - { name: BLOCK, type: String }
            - { name: DISTRICT_LOT, type: String }
            - { name: FROM_CIVIC_NUMBER, type: String }
            - { name: TO_CIVIC_NUMBER, type: String }
            - { name: STREET_NAME, type: String }
            - { name: PROPERTY_POSTAL_CODE, type: String }
            - { name: NARRATIVE_LEGAL_LINE1, type: String }
            - { name: NARRATIVE_LEGAL_LINE2, type: String }
            - { name: NARRATIVE_LEGAL_LINE3, type: String }
            - { name: NARRATIVE_LEGAL_LINE4, type: String }
            - { name: NARRATIVE_LEGAL_LINE5, type: String }
            - { name: CURRENT_LAND_VALUE, type: String }
            - { name: CURRENT_IMPROVEMENT_VALUE, type: String }
            - { name: TAX_ASSESSMENT_YEAR, type: String }
            - { name: PREVIOUS_LAND_VALUE, type: String }
            - { name: PREVIOUS_IMPROVEMENT_VALUE, type: String }
            - { name: YEAR_BUILT, type: String }
            - { name: BIG_IMPROVEMENT_YEAR, type: String }
            - { name: TAX_LEVY, type: String }
            - { name: NEIGHBOURHOOD_CODE, type: String }
            - { name: REPORT_YEAR, type: String }
            - { name: NOTE, type: String }
      preprocess:
        kind: Sql
        engine: datafusion
        query: |
          select
            PID,
            LEGAL_TYPE,
            FOLIO,
            LAND_COORDINATE,
            ZONING_DISTRICT,
            ZONING_CLASSIFICATION,
            LOT,
            PLAN,
            BLOCK,
            DISTRICT_LOT,
            FROM_CIVIC_NUMBER,
            TO_CIVIC_NUMBER,
            STREET_NAME,
            PROPERTY_POSTAL_CODE,
            NARRATIVE_LEGAL_LINE1,
            NARRATIVE_LEGAL_LINE2,
            NARRATIVE_LEGAL_LINE3,
            NARRATIVE_LEGAL_LINE4,
            NARRATIVE_LEGAL_LINE5,
            CURRENT_LAND_VALUE,
            CURRENT_IMPROVEMENT_VALUE,
            TAX_ASSESSMENT_YEAR,
            PREVIOUS_LAND_VALUE,
            PREVIOUS_IMPROVEMENT_VALUE,
            YEAR_BUILT,
            BIG_IMPROVEMENT_YEAR,
            TAX_LEVY,
            NEIGHBOURHOOD_CODE,
            cast(concat(REPORT_YEAR, '-01-01') as date) as REPORT_YEAR,
            NOTE
          from input
      merge:
        kind: Ledger
        primaryKey:
          - REPORT_YEAR
          - PID
    - kind: SetVocab
      eventTimeColumn: REPORT_YEAR
