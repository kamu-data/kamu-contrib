---
kind: DatasetSnapshot
version: 1
content:
  name: com.cryptocompare.ohlcv.eth-usd
  kind: Root
  metadata:
    - kind: SetPollingSource
      fetch:
        kind: Container
        image: "ghcr.io/kamu-data/fetch-com.cryptocompare.ohlcv.eth-usd:0.1.0"
      read:
        kind: NdJson
        schema:
          fields:
            - name: time
              type: Int64
            - name: high
              type: Float64
            - name: low
              type: Float64
            - name: open
              type: Float64
            - name: volumefrom
              type: Float64
            - name: volumeto
              type: Float64
            - name: close
              type: Float64
            - name: conversionType
              type: String
            - name: conversionSymbol
              type: String
      preprocess:
        kind: Sql
        engine: datafusion
        query: |
          select
            to_timestamp_seconds(time) as event_time,
            'eth' as from_symbol,
            'usd' as to_symbol,
            high,
            low,
            open,
            close,
            volumefrom,
            volumeto,
            conversionType as conversion_type,
            conversionSymbol as conversion_symbol
          from input
      merge:
        kind: Ledger
        primaryKey:
          - event_time
          - from_symbol
          - to_symbol
    - kind: SetAttachments
      attachments:
        kind: Embedded
        items:
          - path: README.md
            content: |
              # ETH to USD Prices from CryptoCompare
              This dataset pulls best available granularity data within CryptoCompare's free API tier.
    - kind: SetLicense
      shortName: Proprietary
      name: CryptoCompare - API License Agreement
      websiteUrl: https://www.cryptocompare.com/api-licence-agreement/
