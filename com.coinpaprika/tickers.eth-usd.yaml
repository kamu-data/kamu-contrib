---
kind: DatasetSnapshot
version: 1
content:
  name: com.coinpaprika.tickers.eth-usd
  kind: Root
  metadata:
    - kind: SetPollingSource
      fetch:
        kind: Container
        image: "ghcr.io/kamu-data/fetch-com.coinpaprika.tickers.eth-usd:0.1.0"
      read:
        kind: NdJson
        schema:
          fields:
            - name: timestamp
              type: Timestamp
            - name: price
              type: Float64     # TODO: Use decimal
            - name: volume_24h
              type: Float64
            - name: market_cap
              type: Float64
      preprocess:
        kind: Sql
        engine: datafusion
        query: |
          select
            timestamp as event_time,
            'eth' as from_symbol,
            'usd' as to_symbol,
            price,
            volume_24h,
            market_cap
          from input
      merge:
        kind: Ledger
        primaryKey:
          - event_time
          - from_symbol
          - to_symbol
    - kind: SetAttachments
      attachments:
        kind: Embedded
        items:
          - path: README.md
            content: |
              # ETH to USD Prices from Coinpaprika
              This dataset pull best available granularity data that is within Coinpaprika's free tier.
    - kind: SetLicense
      shortName: Proprietary
      name: Coinpaprika - Terms of Use
      websiteUrl: https://api.coinpaprika.com/#section/Terms-of-use
