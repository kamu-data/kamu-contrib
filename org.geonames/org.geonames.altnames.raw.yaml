kind: DatasetSnapshot
version: 1
content:
  name: org.geonames.altnames.raw
  kind: Root
  metadata:
    - kind: SetPollingSource
      fetch:
        kind: Url
        url: http://download.geonames.org/export/dump/alternateNamesV2.zip
      prepare:
        - kind: decompress
          format: zip
          subPath: alternateNamesV2.txt
      read:
        kind: Csv
        header: false
        separator: "\t"
        # See: https://download.geonames.org/export/dump/readme.txt
        schema:
          fields:
            # the id of this alternate name, int
            - name: alternateNameId
              type: Int64
            # geonameId referring to id in table 'geoname', int
            - name: geonameid
              type: Int64
            # iso 639 language code 2- or 3-characters; 4-characters 'post' for postal codes and 'iata','icao' and faac for airport codes, fr_1793 for French Revolution names,  abbr for abbreviation, link to a website (mostly to wikipedia), wkdt for the wikidataid, varchar(7)
            - name: isolanguage
              type: String
            # alternate name or name variant, varchar(400)
            - name: alternateName
              type: String
            # '1', if this alternate name is an official/preferred name
            - name: isPreferredName
              type: Int32
            # '1', if this is a short name like 'California' for 'State of California'
            - name: isShortName
              type: Int32
            # '1', if this alternate name is a colloquial or slang term. Example: 'Big Apple' for 'New York'.
            - name: isColloquial
              type: Int32
            # '1', if this alternate name is historic and was used in the past. Example 'Bombay' for 'Mumbai'.
            - name: isHistoric
              type: Int32
            # from period when the name was used
            - name: from
              type: String
            # to period when the name was used
            - name: to
              type: String
      # TODO: This no-op step makes kamu-cli use the experimental
      # DataFusion ingest implementation instead of Spark. This should be
      # removed once DataFusion ingest becomes the default.
      preprocess:
        kind: Sql
        engine: datafusion
        query: select * from input
      merge:
        kind: snapshot
        primaryKey:
          - alternateNameId
