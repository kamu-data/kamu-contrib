---
kind: DatasetSnapshot
version: 1
content:
  name: com.github.kamu-data.stargazers
  kind: Root
  metadata:
    - kind: SetPollingSource
      fetch:
        kind: Container
        image: "ghcr.io/kamu-data/fetch-com.github.stats:0.1.0"
        args:
          - --access-token
          - ${{ env.GH_TOKEN }}
          - --owner
          - kamu-data
          - --owner
          - open-data-fabric
          - stargazers
      read:
        kind: NdJson
        schema:
          fields:
            - name: owner_id
              type: Int64
            - name: owner_login
              type: String
            - name: repo_id
              type: Int64
            - name: repo_name
              type: String
            - name: starred_at
              type: Timestamp
            - name: user_id
              type: Int64
            - name: user_login
              type: String
      merge:
        kind: Ledger
        primaryKey:
          - owner_id
          - repo_id
          - starred_at
          - user_id
    - kind: SetVocab
      eventTimeColumn: starred_at
    - kind: SetInfo
      description: History of repository stars in kamu-data GitHub organization
      keywords:
        - ODF
        - Community
        - Social
        - GitHub
    - kind: SetAttachments
      attachments:
        kind: Embedded
        items:
          - path: README.md
            content: |
              # History of repository stars in kamu-data GitHub organization

              See GitHub's [repository traffic API](https://docs.github.com/en/rest/metrics/traffic) documentation for details

