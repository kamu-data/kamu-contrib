---
kind: DatasetSnapshot
version: 1
content:
  name: com.youtube.channel.kamu-data.videos.stats
  kind: Root
  metadata:
    - kind: SetPollingSource
      fetch:
        kind: Container
        image: "ghcr.io/kamu-data/fetch-com.youtube.stats:0.1.0"
        env:
          - name: CHANNEL_ID
            value: "UCWciDIWI_HsJ6Md_DdyJPIQ"
          - name: YOUTUBE_API_KEY
      read:
        kind: NdJson
        schema:
          fields:
            - name: video_id
              type: String
            - name: title
              type: String
            - name: published_at
              type: Timestamp
            - name: channel_id
              type: String
            - name: channel_title
              type: String
            - name: video_owner_channel_id
              type: String
            - name: video_owner_channel_title
              type: String
            - name: view_count
              type: Int64
            - name: like_count
              type: Int64
            - name: comment_count
              type: Int64
            - name: favorite_count
              type: Int64
      merge:
        kind: Snapshot
        primaryKey:
          - video_id
