kind: DatasetSnapshot
version: 1
content:
  name: us.cityofnewyork.data.ems-incident-dispatch
  kind: Root
  metadata:
    - kind: SetPollingSource
      fetch:
        kind: Url
        url: https://data.cityofnewyork.us/api/views/76xm-jjuj/rows.csv?accessType=DOWNLOAD
      read:
        kind: Csv
        header: true
        schema:
          fields:
            # An incident identifier comprising the julian date and a 4 character sequenceLONG starting at 1 each day.
            - name: cad_incident_id
              type: Int64
            # The date and time the incident was created in the dispatch system
            - name: incident_datetime
              type: String
            # The call type assigned at the time of incident creation.
            - name: initial_call_type
              type: String
            # The segment(priority) assigned at the time of incident creation.
            - name: initial_severity_level_code
              type: Int64
            # The call type at the time the incident closes.
            - name: final_call_type
              type: String
            # The segment(priority) assigned at the time the incident closes.
            - name: final_severity_level_code
              type: Int64
            # The date and time the first unit is assigned.
            - name: first_assignment_datetime
              type: String
            # Indicates that the components comprising the calculation of the DISPATCH_RESPONSE_SECONDS_QY are valid."
            - name: valid_dispatch_rspns_time_indc
              type: String
            # The time elapsed in seconds between the incident_datetime and the first_assignment_datetime.
            - name: dispatch_response_seconds_qy
              type: Int64
            # The date and time the first unit gives the signal that it is enroute to the location of the incident.
            - name: first_activation_datetime
              type: String
            # The date and time the first unit signals that it has arrived at the location of the incident.
            - name: first_on_scene_datetime
              type: String
            # Indicates that the components comprising the calculation of theINCIDENT_RESPONSE_SECONDS_QY are valid.
            - name: valid_incident_rspns_time_indc
              type: String
            # The time elapsed in seconds between the incident_datetime and the first_on_scene_datetime.
            - name: incident_response_seconds_qy
              type: Int64
            # The time elapsed in seconds between the first_assignment_datetime and the first_on_scene_datetime.
            - name: incident_travel_tm_seconds_qy
              type: Int64
            # The date and time the first unit gives the signal that it is enroute to the hospital.
            - name: first_to_hosp_datetime
              type: String
            # The date and time the first unit signals that it has arrived at the hospital.
            - name: first_hosp_arrival_datetime
              type: String
            # The date and time the incident closes in the dispatch system.
            - name: incident_close_datetime
              type: String
            # Indicates that for some reason a unit could not be assigned immediately
            - name: held_indicator
              type: String
            # A code indicating the final outcome of the incident. See incident dispositions.
            - name: incident_disposition_code
              type: String
            # The borough of the incident location.
            - name: borough
              type: String
            # The dispatch area of the incident.
            - name: incident_dispatch_area
              type: String
            # The zip code of the incident.
            - name: zipcode
              type: String
            # The police precinct of the incident.
            - name: policeprecinct
              type: Int64
            # The city council district.
            - name: citycouncildistrict
              type: Int64
            # The community district.
            - name: communitydistrict
              type: Int64
            # The community school district.
            - name: communityschooldistrict
              type: Int64
            # The congressional district.
            - name: congressionaldistrict
              type: Int64
            # Indicates that at some point the incident was closed but then reopened.
            - name: reopen_indicator
              type: String
            # Indicates that the incident was a special event such as the NYC Marathon.
            - name: special_event_indicator
              type: String
            # Indicates that the units were assigned to stand by in case they were needed.
            - name: standby_indicator
              type: String
            # Indicates that the incident was created for the transportation of a patient from one facility (ie a hospital or nursing home) to another.
            - name: transfer_indicator
              type: String
      # TODO: remove this step once timestampFormat support is added in https://github.com/kamu-data/kamu-cli/issues/438
      preprocess:
        kind: Sql
        engine: datafusion
        query: |
          select
            cad_incident_id,
            to_timestamp(incident_datetime, '%m/%d/%Y %I:%M:%S %p') as incident_datetime,
            initial_call_type,
            initial_severity_level_code,
            final_call_type,
            final_severity_level_code,
            to_timestamp(first_assignment_datetime, '%m/%d/%Y %I:%M:%S %p') as first_assignment_datetime,
            valid_dispatch_rspns_time_indc,
            dispatch_response_seconds_qy,
            to_timestamp(first_activation_datetime, '%m/%d/%Y %I:%M:%S %p') as first_activation_datetime,
            to_timestamp(first_on_scene_datetime, '%m/%d/%Y %I:%M:%S %p') as first_on_scene_datetime,
            valid_incident_rspns_time_indc,
            incident_response_seconds_qy,
            incident_travel_tm_seconds_qy,
            to_timestamp(first_to_hosp_datetime, '%m/%d/%Y %I:%M:%S %p') as first_to_hosp_datetime,
            to_timestamp(first_hosp_arrival_datetime, '%m/%d/%Y %I:%M:%S %p') as first_hosp_arrival_datetime,
            to_timestamp(incident_close_datetime, '%m/%d/%Y %I:%M:%S %p') as incident_close_datetime,
            held_indicator,
            incident_disposition_code,
            borough,
            incident_dispatch_area,
            zipcode,
            policeprecinct,
            citycouncildistrict,
            communitydistrict,
            communityschooldistrict,
            congressionaldistrict,
            reopen_indicator,
            special_event_indicator,
            standby_indicator,
            transfer_indicator
          from input
      merge:
        kind: Ledger
        primaryKey:
          - cad_incident_id
    - kind: SetVocab
      eventTimeColumn: incident_datetime
